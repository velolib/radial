name: Release Build
on:
  push:
    tags: ["v*"] # Triggers only when you push a tag like v1.0.0+26.1.2

jobs:
  build:
    name: Build Tagged Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build --stacktrace --no-daemon

      - name: Clean Extra Artifacts
        run: |
          # Cleanup extra jars so only the main production jar gets uploaded
          rm build/libs/*-sources.jar build/libs/*-dev.jar || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radial-${{ github.ref_name }}
          path: build/libs/*.jar
          if-no-files-found: error